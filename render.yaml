# render.yaml

services:
  - type: web
    name: ecommerce-api
    env: go
    plan: free
    buildCommand: go build -o ecommerce-api
    startCommand: ./ecommerce-api
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: COST_API_KEY
        sync: false

databases:
  - name: ecommerce-db         # internal name in Render; must match fromDatabase.name
    plan: free
    databaseName: ecommerce
    user: ecommerce_user
