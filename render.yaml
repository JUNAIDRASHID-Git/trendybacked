# render.yaml

services:
  - type: web
    name: ecommerce-api
    env: go
    plan: free
    # Build your binary
    buildCommand: go build -o ecommerce-api
    # Run your binary
    startCommand: ./ecommerce-api
    # Tell Render to watch for changes and redeploy
    autoDeploy: true
    # Expose port 8080 to the world
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: COST_API_KEY        # your custom API key
        sync: false

databases:
  - name: ecommerce-db        # internal name in Render
    engine: postgres
    version: "15"             # pick the Postgres version you need
    plan: free
    databaseName: ecommerce
    user: ecommerce_user
